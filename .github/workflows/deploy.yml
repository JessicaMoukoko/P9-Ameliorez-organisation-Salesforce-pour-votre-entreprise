name: Déploiement Automatique (CD)

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Tests Automatisés (CI)"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' || 
      (github.event.workflow_run.conclusion == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Salesforce CLI
      run: npm install -g @salesforce/cli
        
    - name: Authenticate to Salesforce
      env:
        SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
        SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
        SALESFORCE_USERNAME: ${{ secrets.SALESFORCE_USERNAME }}
        SALESFORCE_PASSWORD: ${{ secrets.SALESFORCE_PASSWORD }}
      run: |
        echo "🔐 Authentification à Salesforce..."
        
        sf org login web \
          --client-id "${{ env.SALESFORCE_CLIENT_ID }}" \
          --client-secret "${{ env.SALESFORCE_CLIENT_SECRET }}" \
          --instance-url https://login.salesforce.com \
          --alias devhub \
          --set-default \
          --no-prompt
        
    - name: Validate deployment
      run: |
        echo "✓ Validation du code avant déploiement..."
        ls -la force-app/ || echo "Structure Salesforce non trouvée"
        
    - name: Deploy to Salesforce
      run: |
        echo "🚀 Déploiement en cours vers Salesforce..."
        sf project deploy start --target-org devhub
        echo "✅ Déploiement terminé avec succès!"
      
    - name: Run post-deployment tests
      if: success()
      run: |
        echo "🧪 Exécution des tests post-déploiement..."
        sf apex test run --target-org devhub
        
    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Déploiement réussi!"
          echo "Votre code a été déployé en production."
        else
          echo "❌ Erreur lors du déploiement!"
          echo "Veuillez vérifier les logs ci-dessus."
        fi

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Nettoyage effectué"