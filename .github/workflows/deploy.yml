name: CI/CD Pipeline - Tests et Deploiement Salesforce

# Declencheurs :
# - Pull Request vers main : CI uniquement (bloque le merge si echec)
# - Push sur main : CI puis deploiement si CI reussie
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:

  # ──────────────────────────────────────────
  # JOB 1 - CI : Tests avant tout deploiement
  # ──────────────────────────────────────────
  ci:
    name: "Tests CI"
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dependances npm
        run: npm install

      # Tests unitaires LWC avec Jest
      # Si un test echoue, le job echoue et le deploiement est bloqué
      - name: Lancer les tests LWC
        run: npm run test:unit:coverage

      # Verification que la couverture de code est superieure a 75%
      # Jest s'en charge automatiquement grace au coverageThreshold dans package.json
      - name: Verifier la couverture de code
        run: |
          echo "Verification de la couverture..."
          if [ ! -f "coverage/coverage-summary.json" ]; then
            echo "Erreur : fichier de couverture introuvable"
            exit 1
          fi
          COVERAGE=$(node -e "const data = require('./coverage/coverage-summary.json'); console.log(data.total.lines.pct)")
          echo "Couverture actuelle : ${COVERAGE}%"
          if [ $(echo "$COVERAGE < 75" | bc) -eq 1 ]; then
            echo "Echec : couverture insuffisante (${COVERAGE}% < 75%)"
            exit 1
          fi
          echo "OK : couverture suffisante (${COVERAGE}%)"

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        run: |
          sf org login access-token \
            --instance-url "${{ secrets.SALESFORCE_INSTANCE_URL }}" \
            --no-prompt \
            --alias target-org \
            --set-default

      # Validation dry-run : verifie le code ET lance les tests Apex
      # --dry-run = pas de deploiement reel
      # --test-level RunLocalTests = tous les tests Apex sont executes
      # Salesforce bloque automatiquement si couverture < 75% ou test en echec
      - name: Valider le code Salesforce (dry-run + tests Apex)
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --dry-run \
            --test-level RunLocalTests \
            --wait 30

  # ──────────────────────────────────────────────────────────────
  # JOB 2 - CD : Deploiement uniquement si CI reussie + push main
  # ──────────────────────────────────────────────────────────────
  cd:
    name: "Deploiement Salesforce"
    runs-on: ubuntu-latest
    needs: ci
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        run: |
          sf org login access-token \
            --instance-url "${{ secrets.SALESFORCE_INSTANCE_URL }}" \
            --no-prompt \
            --alias target-org \
            --set-default

      # Deploiement reel avec tests Apex integres
      # --test-level RunLocalTests = les tests sont executes PENDANT le deploiement
      # Si un test echoue ou couverture < 75% : Salesforce annule le deploiement
      - name: Deployer vers Salesforce
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 60

      - name: Resume du deploiement
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deploiement reussi !"
          else
            echo "Deploiement echoue - voir les logs ci-dessus"
          fi
          echo "Date    : $(date)"
          echo "Commit  : ${{ github.sha }}"