name: CI/CD Pipeline - Tests et Deploiement Salesforce

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # CI - TESTS
  # ──────────────────────────────────────────
  ci:
    name: "Tests CI"
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Installer dependances npm
        run: npm install

      - name: Lancer tests LWC
        run: npm run test:unit:coverage

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      # ────────────────
      # AUTH SALESFORCE (FIX IMPORTANT)
      # ────────────────
      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          echo "$SF_ACCESS_TOKEN" | sfdx auth:accesstoken:store \
            --instance-url "$SF_INSTANCE_URL" \
            --setdefaultusername \
            --alias target-org

      # ────────────────
      # VALIDATION DEPLOY
      # ────────────────
      - name: Validation du code Salesforce (dry-run)
        run: |
          sfdx force:source:deploy \
            -p force-app \
            -u target-org \
            --checkonly \
            --testlevel RunLocalTests \
            --wait 30

  # ──────────────────────────────────────────
  # CD - DEPLOIEMENT
  # ──────────────────────────────────────────
  cd:
    name: "Deploiement Salesforce"
    runs-on: ubuntu-latest
    needs: ci
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      # ────────────────
      # AUTH SALESFORCE
      # ────────────────
      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          echo "$SF_ACCESS_TOKEN" | sfdx auth:accesstoken:store \
            --instance-url "$SF_INSTANCE_URL" \
            --setdefaultusername \
            --alias target-org

      # ────────────────
      # DEPLOIEMENT
      # ────────────────
      - name: Deploiement vers Salesforce
        run: |
          sfdx force:source:deploy \
            -p force-app \
            -u target-org \
            --testlevel RunLocalTests \
            --wait 60

      # ────────────────
      # RESUME
      # ────────────────
      - name: Resume du deploiement
        if: always()
        run: |
          echo "Status   : ${{ job.status }}"
          echo "Date     : $(date)"
          echo "Commit   : ${{ github.sha }}"