name: CI/CD Pipeline - Tests et Deploiement Salesforce

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Force Node.js 24 pour les actions GitHub (Node.js 20 est deprecie depuis juin 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # JOB 1 - Continuous Integration (CI)
  # ──────────────────────────────────────────
  ci:
    name: "Tests CI"
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dependances npm
        run: npm install

      - name: Lancer les tests LWC
        run: npm run test:unit:coverage

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          sf org login access-token \
            --instance-url "$SF_INSTANCE_URL" \
            --alias target-org \
            --set-default \
            --no-prompt

      - name: Valider le code Salesforce (dry-run + tests Apex)
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --dry-run \
            --test-level RunLocalTests \
            --wait 30

  # ──────────────────────────────────────────────────────────────
  # JOB 2 - Continuous Deployment (CD)
  # ──────────────────────────────────────────────────────────────
  cd:
    name: "Deploiement Salesforce"
    runs-on: ubuntu-latest
    needs: ci
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          sf org login access-token \
            --instance-url "$SF_INSTANCE_URL" \
            --alias target-org \
            --set-default \
            --no-prompt

      - name: Deployer vers Salesforce
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 60

      - name: Resume du deploiement
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deploiement reussi !"
          else
            echo "Deploiement echoue - voir les logs ci-dessus"
          fi
          echo "Date    : $(date)"
          echo "Commit  : ${{ github.sha }}"