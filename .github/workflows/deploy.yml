name: Déploiement Automatique (CD)

on:
  push:
    branches: [ main ]  # Déploiement automatique seulement sur main
  workflow_run:
    workflows: ["Tests Automatisés (CI)"]  # Déclenché après succès des tests
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Ne déployer que si les tests sont passés (pour workflow_run)
    if: |
      github.event_name == 'push' || 
      (github.event.workflow_run.conclusion == 'success')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Salesforce CLI
      run: |
        npm install -g @salesforce/cli || echo "Salesforce CLI already installed"
        
    - name: Authenticate to Salesforce
      env:
        SALESFORCE_AUTH_DEVICE_FLOW: true
      run: |
        echo "🔐 Authentification à Salesforce..."
        # Option 1: Utiliser les credentials stockés dans les secrets GitHub

            sfdx force:auth:jwt:grant \
            --clientid="${{ secrets.SALESFORCE_CLIENT_ID }}" \
            --username="${{ secrets.SALESFORCE_USERNAME }}" \
           --setdefaultdevhubusername
        
        # Option 2: Utiliser le Device Flow (plus simple pour commencer)

        echo "⚠️  Configurez vos credentials Salesforce via GitHub Secrets"
        echo "   - SALESFORCE_CLIENT_ID"
        echo "   - SALESFORCE_CLIENT_SECRET"
        echo "   - SALESFORCE_USERNAME"
        
    - name: Validate deployment
      run: |
        echo "✓ Validation du code avant déploiement..."
        # Vérifier que tous les fichiers sont présents
        ls -la force-app/ || echo "Structure Salesforce non trouvée"
        
        - name: Deploy to Salesforce
        run: |
          echo "🚀 Déploiement en cours vers Salesforce..."
          sf project deploy start --target-org=${{ secrets.SALESFORCE_ORG_ID }}
          echo "✅ Déploiement terminé avec succès!"
      
      - name: Run post-deployment tests
        if: success()
        run: |
          echo "🧪 Exécution des tests post-déploiement..."
          sf apex test run --target-org=${{ secrets.SALESFORCE_ORG_ID }}
        
    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Déploiement réussi!"
          echo "Votre code a été déployé en production."
        else
          echo "❌ Erreur lors du déploiement!"
          echo "Veuillez vérifier les logs ci-dessus."
        fi

    - name: Cleanup
      if: always()
      run: |
        # Nettoyer les fichiers sensibles
        rm -f server.key
        echo "🧹 Nettoyage effectué"
