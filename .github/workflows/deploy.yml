name: CI/CD Pipeline - Tests et Deploiement Salesforce
# Ce workflow GitHub Actions est conçu pour automatiser les tests et le déploiement de votre projet Salesforce.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # CI - TESTS
  # ──────────────────────────────────────────
  ci:
    name: "Tests CI"
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer dependances npm
        run: npm install

      - name: Lancer tests LWC
        run: npm run test:unit:coverage

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          sf org login access-token \
            --instance-url "$SF_INSTANCE_URL" \
            --alias target-org \
            --set-default \
            --no-prompt

      - name: Validation du code Salesforce (dry-run + tests Apex)
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --dry-run \
            --test-level RunLocalTests \
            --wait 30

  # ──────────────────────────────────────────
  # CD - DEPLOIEMENT
  # ──────────────────────────────────────────
  cd:
    name: "Deploiement Salesforce"
    runs-on: ubuntu-latest
    needs: ci
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authentification Salesforce
        env:
          SF_INSTANCE_URL: ${{ secrets.SALESFORCE_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SALESFORCE_ACCESS_TOKEN }}
        run: |
          sf org login access-token \
            --instance-url "$SF_INSTANCE_URL" \
            --alias target-org \
            --set-default \
            --no-prompt

      - name: Deploiement vers Salesforce
        run: |
          sf project deploy start \
            --target-org target-org \
            --source-dir force-app \
            --test-level RunLocalTests \
            --wait 60

      - name: Resume du deploiement
        if: always()
        run: |
          echo "Status   : ${{ job.status }}"
          echo "Date     : $(date)"
          echo "Commit   : ${{ github.sha }}"